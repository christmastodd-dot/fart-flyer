<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover lets the canvas bleed under the notch/home bar on iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- Allow full-screen launch from Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fart Flyer" />
  <title>Fart Flyer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Shrink the usable area to avoid the notch and home indicator */
      height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      margin-top: env(safe-area-inset-top);
      overflow: hidden;
      touch-action: none;         /* kill double-tap zoom on iOS */
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Never let the canvas overlap the home indicator or notch */
      max-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      max-width: 100vw;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script src="sprites.js"></script>
  <script src="audio.js"></script>
  <script src="haptics.js"></script>
  <script src="renderer.js"></script>
  <script src="game.js"></script>
</body>
</html>
